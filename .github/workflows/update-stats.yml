name: Update Stats and Metrics
on:
  schedule: [{cron: "0 1 * * *"}]
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Update GitHub Stats Image
        run: |-
          mkdir -p ./.github/assets/images/
          curl -L -o ./.github/assets/images/stats_en.svg "https://github-readme-stats-sigma-five.vercel.app/api?username=LeonardLeroy&show_icons=true&hide_border=true&theme=transparent"

      - name: Full Languages Only
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: .github/assets/images/langs.svg
          base: "" 
          plugin_languages: yes
          plugin_languages_limit: 0
          plugin_languages_details: percentage
          plugin_languages_sections: most-used
          config_timezone: Europe/Paris
          config_order: plugin.languages
          extras_css: |
            h2, .header, .title { display: none !important; }
          output_action: none 

      - name: Commit and push changes
        run: |-
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/assets/images/*.svg
          git commit -m "[auto] Update stats and languages" || exit 0
          git push
