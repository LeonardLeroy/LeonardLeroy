name: Update Stats and Metrics
on:
  schedule: [{cron: "0 1 * * *"}]
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Full Languages Only
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: .github/assets/images/langs_full.svg
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 0
          plugin_languages_details: percentage
          output_action: commit
          committer_branch: main

      - name: Update GitHub Stats Image
        run: |-
          mkdir -p ./.github/assets/images/
          curl -L -o ./.github/assets/images/stats_en.svg "https://github-readme-stats-sigma-five.vercel.app/api?username=LeonardLeroy&show_icons=true&hide_border=true&theme=transparent"

      # ÉTAPE C : Commit la mise à jour des stats
      - name: Git configuration
        run: |-
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/assets/images/stats_en.svg
          git commit -m "[auto] Updated stats images" || exit 0
          git push origin main
