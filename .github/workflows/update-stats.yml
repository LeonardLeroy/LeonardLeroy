name: Update GitHub Stats

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch: 

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Git configuration
        run: |-
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update stats images
        run: |-
          mkdir -p ./.github/assets/images/
          curl -L -o ./.github/assets/images/stats_en.svg "https://github-readme-stats-sigma-five.vercel.app/api?username=LeonardLeroy&show_icons=true&hide_border=true&theme=transparent"
          curl -L -o ./.github/assets/images/langs_en.svg "https://github-readme-stats-sigma-five.vercel.app/api/top-langs/?username=LeonardLeroy&layout=compact&hide_border=true&theme=transparent&langs_count=15"

      - name: Check file sizes
        run: ls -lh ./.github/assets/images/

      - name: Commit and push
        run: |-
          git add .github/assets/images/*.svg
          git commit -m "[auto] Updated stats and languages images" || exit 0
          git push origin main
