name: Update GitHub Stats

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch: # Pour le lancer à la main

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Git configuration
        run: |-
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update stats image
        run: |-
          mkdir -p ./.github/assets/images/
          # On utilise un miroir stable (yurisuiko) au lieu de l'officiel qui sature
          curl -L -o ./.github/assets/images/stats_en.svg "https://github-readme-stats-sigma-five.vercel.app/api?username=LeonardLeroy&show_icons=true&hide_border=true&theme=transparent"
          
      - name: Check file size
        run: ls -lh ./.github/assets/images/stats_en.svg

      - name: Commit and push
        run: |-
          git add .github/assets/images/stats_en.svg
          git commit -m "[auto] Updated stats images" || exit 0
          git push origin main
